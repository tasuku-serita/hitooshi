<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ヒトオシ — しんどい日のやさしい1タップ</title>
<style>
:root {
  --cr: #FDF5EC;
  --lv: #C4B4D8;
  --lv-l: #EDE8F5;
  --lv-m: #B0A0CC;
  --lv-d: #9A86B6;
  --pk: #E0B8C4;
  --pk-l: #F8ECF0;
  --pk-m: #C89AAC;
  --pk-d: #B88A9C;
  --be: #E8DDD0;
  --be-d: #D0C0B0;
  --tx: #4E3E4C;
  --tx-m: #7A6878;
  --tx-s: #A898A8;
  --wh: #FFFFFF;
  --sh: 0 4px 24px rgba(130,90,120,.11);
  --sh-s: 0 2px 10px rgba(130,90,120,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--cr);
  background-image:
    radial-gradient(ellipse at 12% 88%, rgba(196,180,216,.17) 0%, transparent 52%),
    radial-gradient(ellipse at 88% 12%, rgba(224,184,196,.17) 0%, transparent 52%);
  font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  color:var(--tx);
  min-height:100vh;
  padding:0 16px max(32px,env(safe-area-inset-bottom,32px));
  max-width:480px;
  margin:0 auto;
}

/* ── Header ── */
.hd{
  padding:36px 4px 26px;
  position:relative;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.snd-btn{
  position:absolute;top:36px;right:4px;
  background:var(--wh);border:none;border-radius:20px;
  padding:6px 12px;font-size:11px;color:var(--tx-s);
  cursor:pointer;display:flex;align-items:center;gap:4px;
  box-shadow:var(--sh-s);transition:box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
}
.snd-btn:hover{box-shadow:0 3px 14px rgba(130,90,120,.17)}
.logo{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--lv) 0%,var(--pk) 100%);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:#fff;
  box-shadow:0 3px 10px rgba(170,130,190,.26);
  margin-bottom:2px;
}
.app-name{font-size:26px;font-weight:800;letter-spacing:.18em;color:var(--tx)}
/* 共感フック：初見3秒で「自分向け」と感じさせる */
.app-hook{
  font-size:15px;font-weight:700;color:var(--tx);
  letter-spacing:.02em;line-height:1.5;text-align:center;
  margin-top:3px;
}
/* ベネフィット説明：短く・理解重視 */
.app-sub{
  font-size:11px;color:var(--tx-s);
  letter-spacing:.03em;line-height:1.6;text-align:center;
  margin-top:1px;
}

/* ── Section ── */
.sec{margin-bottom:20px}
.lbl{
  font-size:10.5px;font-weight:700;color:var(--tx-s);
  letter-spacing:.16em;text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:7px;
}
.lbl::after{content:'';flex:1;height:1px;background:var(--be)}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  background:var(--wh);border:1.5px solid var(--be);border-radius:22px;
  padding:7px 14px;font-size:12.5px;color:var(--tx-m);
  cursor:pointer;
  transition:background .16s,border-color .16s,color .16s,box-shadow .16s,transform .1s;
  user-select:none;-webkit-tap-highlight-color:transparent;
  box-shadow:var(--sh-s);
}
.chip:active{transform:scale(.96)}
.mood-chips .chip.on{
  background:var(--lv);border-color:var(--lv);color:#fff;font-weight:600;
  box-shadow:0 3px 12px rgba(160,140,210,.34);
}
.scene-chips .chip.on{
  background:var(--pk);border-color:var(--pk);color:#fff;font-weight:600;
  box-shadow:0 3px 12px rgba(200,154,172,.34);
}

/* ── Main Button ── */
.btn-wrap{padding:4px 0 18px}
.main-btn{
  width:100%;
  background:linear-gradient(135deg,var(--lv-m) 0%,var(--pk-m) 100%);
  border:none;border-radius:26px;
  padding:17px 24px;
  font-size:15.5px;font-weight:700;color:#fff;
  cursor:pointer;letter-spacing:.08em;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 5px 20px rgba(175,125,165,.33);
  -webkit-tap-highlight-color:transparent;
}
.main-btn:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(175,125,165,.42)}
.main-btn:active{transform:translateY(1px);box-shadow:0 3px 12px rgba(175,125,165,.26)}

/* ── Result Card ── */
.card{
  background:var(--wh);border-radius:22px;
  padding:24px 20px 20px;
  margin-bottom:12px;
  box-shadow:var(--sh);
  display:none;opacity:0;transform:translateY(14px);
  transition:opacity .36s ease,transform .36s ease;
  position:relative;overflow:hidden;
}
.card.vis{display:block}
.card.in{opacity:1;transform:translateY(0)}
.card-bar{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--lv) 0%,var(--pk) 100%);
  border-radius:22px 22px 0 0;
}
.card-body{display:flex;gap:12px;align-items:flex-start}
.card-texts{flex:1;min-width:0}

/* メッセージ：主役 */
.c-msg{
  font-size:15px;line-height:1.82;color:var(--tx);font-weight:500;
  margin-bottom:16px;min-height:2.2em;
}

/* 行動提案：次の一歩として視認性強化 */
.c-act-row{
  display:flex;align-items:stretch;
  border-radius:12px;overflow:hidden;
  border:1.5px solid var(--pk);
  background:var(--pk-l);
  opacity:0;
  transition:opacity .35s ease;
}
.c-act-icon{
  width:34px;flex-shrink:0;
  background:var(--pk);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#fff;font-weight:700;
}
.c-act-text{
  padding:10px 12px;
  font-size:13px;color:var(--tx-m);line-height:1.5;font-weight:500;
  flex:1;
}

/* マスコット：控えめ・達成時に活きる */
.mascot-box{
  width:52px;flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:center;
  padding-top:4px;padding-bottom:2px;
}
.mascot{
  width:48px;height:48px;
  object-fit:contain;object-position:center;
  opacity:.75;transition:opacity .3s;
}
.mascot.pop{animation:mpop .55s cubic-bezier(.34,1.56,.64,1);opacity:1}
@keyframes mpop{
  0%{transform:scale(1) rotate(0)}
  38%{transform:scale(1.38) rotate(-8deg)}
  68%{transform:scale(.91) rotate(4deg)}
  100%{transform:scale(1) rotate(0)}
}

/* ── Particles ── */
.c-particle{
  position:absolute;border-radius:50%;
  opacity:0;pointer-events:none;
  will-change:transform,opacity;
  animation:particleUp 1.8s ease-out forwards;
}
@keyframes particleUp{
  0%{opacity:0;transform:translate3d(0,0,0)}
  20%{opacity:.55}
  80%{opacity:.35}
  100%{opacity:0;transform:translate3d(0,-58px,0)}
}

/* ── Flower ── */
.flower-svg{
  position:absolute;top:50%;left:50%;
  width:100px;height:100px;overflow:visible;
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;z-index:10;
  animation:flowerBloom .9s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes flowerBloom{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  12%{opacity:1}
  75%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.06)}
}
.f-p{opacity:0;animation:fPIn .55s ease-out forwards}
.f-p:nth-child(2){animation-delay:.07s}
.f-p:nth-child(3){animation-delay:.14s}
.f-p:nth-child(4){animation-delay:.21s}
.f-p:nth-child(5){animation-delay:.28s}
.f-ctr{opacity:0;animation:fPIn .4s ease-out .16s forwards}
@keyframes fPIn{to{opacity:1}}

/* ── Action Buttons ── */
.act-btns{display:none;gap:9px;margin-bottom:22px}
.act-btns.vis{display:flex}
.btn-fav{
  flex:1;background:var(--wh);border:1.5px solid var(--be);border-radius:18px;
  padding:11px 8px;font-size:13px;color:var(--tx-s);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
  box-shadow:var(--sh-s);
}
.btn-fav.on{background:var(--pk-l);border-color:var(--pk);color:var(--pk-m)}
.btn-done{
  flex:2;
  background:linear-gradient(135deg,#ECD4F4 0%,#F4D4DC 100%);
  border:none;border-radius:18px;
  padding:12px 8px;
  font-size:14px;font-weight:700;color:var(--tx);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 14px rgba(175,145,195,.2);
  -webkit-tap-highlight-color:transparent;
}
.btn-done:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(175,145,195,.3)}
.btn-done:active{transform:translateY(1px)}

/* ── Divider ── */
.div{height:1px;background:linear-gradient(90deg,transparent,var(--be),transparent);margin:4px 0 22px;display:none}

/* ── Favorites Carousel ── */
.fav-sec{display:none;padding-bottom:8px}
.fav-sec.vis{display:block}
.fav-ttl{font-size:10.5px;font-weight:700;color:var(--tx-s);letter-spacing:.16em;margin-bottom:10px}
.fav-indicator{font-size:10px;color:var(--tx-s);margin-bottom:8px;min-height:14px}
.fav-stage{position:relative;overflow:hidden;transition:opacity .15s ease-out,transform .15s ease-out}
.fav-card{background:var(--wh);border-radius:16px;padding:14px 13px;box-shadow:0 2px 10px rgba(130,90,120,.08)}
.fav-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.fav-tag{font-size:10px;color:var(--tx-s)}
.fav-date{font-size:9.5px;color:var(--tx-s);opacity:.7;margin-top:2px}
.fav-msg{font-size:12.5px;color:var(--tx-m);line-height:1.55;margin:6px 0}
.fav-bottom{display:flex;align-items:center;justify-content:space-between}
.fav-step{font-size:10px;color:var(--pk-m)}
.fav-del{
  background:none;border:none;color:var(--be-d);cursor:pointer;
  font-size:16px;line-height:1;padding:2px 4px;
  transition:color .15s;user-select:none;-webkit-tap-highlight-color:transparent;
}
.fav-del:hover{color:var(--pk-m)}
.fav-save{
  background:none;border:none;font-size:11px;color:var(--tx-s);
  cursor:pointer;padding:2px 4px;transition:color .15s;-webkit-tap-highlight-color:transparent;
}
.fav-save:hover{color:var(--pk-m)}
.fav-nav-row{display:flex;justify-content:center;gap:16px;margin-top:10px}
.fav-nav-btn{
  background:none;border:1.5px solid var(--be);border-radius:50%;
  width:30px;height:30px;font-size:15px;color:var(--tx-s);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
}
.fav-nav-btn:hover:not(:disabled){border-color:var(--pk);color:var(--pk-m)}
.fav-nav-btn:disabled{opacity:.28;cursor:default}

/* ── Confetti ── */
.cel{position:fixed;inset:0;pointer-events:none;z-index:999;display:none}
.cel.on{display:block}
.dot{position:absolute;border-radius:50%;animation:fall linear forwards}
@keyframes fall{
  0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}
  80%{opacity:1}
  100%{opacity:0;transform:translateY(100vh) scale(.35) rotate(540deg)}
}

/* ── Toast ── */
.toast{
  position:fixed;
  bottom:max(28px,env(safe-area-inset-bottom,28px));
  left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(70,55,68,.88);color:#fff;
  padding:9px 18px;border-radius:18px;font-size:12.5px;
  opacity:0;transition:opacity .24s,transform .24s;
  pointer-events:none;z-index:1000;
  backdrop-filter:blur(8px);white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.interact{pointer-events:auto}
.toast-del-btn{
  background:var(--pk-m);color:#fff;border:none;border-radius:10px;
  padding:3px 10px;font-size:11px;cursor:pointer;margin-left:6px;vertical-align:middle;
}

/* ── Calendar ── */
.cal-sec{padding-bottom:44px}
.cal-toggle{
  width:100%;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  font-size:10.5px;font-weight:700;color:var(--tx-s);letter-spacing:.16em;
  padding:4px 0 16px;-webkit-tap-highlight-color:transparent;
}
.cal-toggle::after{content:'';flex:1;height:1px;background:var(--be)}
.cal-arrow{font-size:10px;transition:transform .25s;margin-left:2px}
.cal-open .cal-arrow{transform:rotate(180deg)}
.cal-body{display:none;padding-bottom:8px}
.cal-body.open{display:block}
.cal-month-label{font-size:11.5px;font-weight:700;color:var(--tx-m);text-align:center;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:9px;color:var(--tx-s);text-align:center;padding-bottom:4px}
.cal-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx-s)}
.cal-day.visited{background:var(--lv-l);color:var(--lv-d);font-weight:600}
.cal-day.today{outline:1.5px solid var(--lv);outline-offset:1px}

/* ── Onboarding ── */
.onboard{
  position:fixed;inset:0;z-index:2000;background:var(--cr);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px max(40px,env(safe-area-inset-bottom,40px));text-align:center;
}
.ob-steps-wrap{position:relative;flex:1;width:100%;display:flex;align-items:center;justify-content:center}
.ob-step{
  position:absolute;width:100%;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  opacity:0;pointer-events:none;transition:opacity .4s ease;
}
.ob-step.on{opacity:1;pointer-events:auto}
.ob-icon{font-size:46px}
.ob-txt{font-size:19px;font-weight:800;color:var(--tx);line-height:1.55;letter-spacing:.02em}
.ob-chips-demo{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.ob-chip{background:var(--wh);border:1.5px solid var(--be);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--tx-m)}
.ob-chip.hi{background:var(--lv);border-color:var(--lv);color:#fff}
.ob-bottom{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
.ob-dots{display:flex;gap:8px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--be);transition:background .3s}
.ob-dot.on{background:var(--lv)}
.ob-start{
  width:100%;max-width:260px;
  background:linear-gradient(135deg,var(--lv-m),var(--pk-m));
  border:none;border-radius:22px;padding:14px 24px;
  font-size:15px;font-weight:700;color:#fff;cursor:pointer;
  box-shadow:0 4px 16px rgba(175,125,165,.3);-webkit-tap-highlight-color:transparent;
}
.ob-skip{background:none;border:none;font-size:11.5px;color:var(--tx-s);cursor:pointer;padding:4px}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01s!important;animation-delay:0s!important;transition-duration:.01s!important}
}
@media(min-width:480px){body{padding-bottom:52px}.hd{padding-top:48px}}
@media(max-width:360px){.chip{font-size:12px;padding:6px 12px}.app-name{font-size:24px}}
</style>
</head>
<body>

<header class="hd">
  <button class="snd-btn" id="sndBtn" onclick="toggleSnd()" aria-label="応援音切替">
    <span id="sndIco">🔔</span><span id="sndTxt">応援あり</span>
  </button>
  <div class="logo" aria-hidden="true">✦</div>
  <div class="app-name">ヒトオシ</div>
  <div class="app-hook" id="appHook">仕事、ちょっとしんどい？</div>
  <div class="app-sub">気分と場面を選んで、やさしいひと押しを届けます</div>
</header>

<section class="sec">
  <div class="lbl">いまの気分</div>
  <div class="chips mood-chips" id="moodC" role="group" aria-label="気分を選ぶ">
    <button class="chip" data-v="だるい" aria-pressed="false">😪 だるい</button>
    <button class="chip" data-v="眠い" aria-pressed="false">💤 眠い</button>
    <button class="chip" data-v="不安" aria-pressed="false">😰 不安</button>
    <button class="chip" data-v="行きたくない" aria-pressed="false">🚫 行きたくない</button>
    <button class="chip" data-v="人に会いたくない" aria-pressed="false">🙈 人に会いたくない</button>
    <button class="chip" data-v="何もしたくない" aria-pressed="false">🌫️ 何もしたくない</button>
    <button class="chip" data-v="めんどくさい" aria-pressed="false">😮‍💨 めんどくさい</button>
    <button class="chip" data-v="緊張する" aria-pressed="false">💦 緊張する</button>
    <button class="chip" data-v="気分が重い" aria-pressed="false">☁️ 気分が重い</button>
    <button class="chip" data-v="疲れている" aria-pressed="false">🪫 疲れている</button>
  </div>
</section>

<section class="sec">
  <div class="lbl">いまどこ？</div>
  <div class="chips scene-chips" id="sceneC" role="group" aria-label="場所を選ぶ">
    <button class="chip" data-v="出勤前" aria-pressed="false">🌅 出勤前</button>
    <button class="chip" data-v="通勤中" aria-pressed="false">🚃 通勤中</button>
    <button class="chip" data-v="仕事前" aria-pressed="false">💼 仕事前</button>
    <button class="chip" data-v="昼休み中" aria-pressed="false">☕ 昼休み中</button>
    <button class="chip" data-v="午後つらいとき" aria-pressed="false">🌇 午後つらいとき</button>
  </div>
</section>

<div class="btn-wrap">
  <button class="main-btn" id="mainBtn" onclick="go()">そっと背中を押して ✦</button>
</div>

<div class="card" id="card">
  <div class="card-bar"></div>
  <div class="card-body">
    <div class="card-texts">
      <div class="c-msg" id="cMsg" aria-live="polite"></div>
      <div class="c-act-row" id="cActRow">
        <div class="c-act-icon">▷</div>
        <div class="c-act-text" id="cAct"></div>
      </div>
    </div>
    <div class="mascot-box">
      <img src="mascot.png" alt="" class="mascot" id="mascot" onerror="this.parentElement.style.display='none'">
    </div>
  </div>
</div>

<div class="act-btns" id="actBtns">
  <button class="btn-fav" id="favBtn" onclick="toggleFav()" aria-label="お気に入りに追加">
    <span id="favIco" aria-hidden="true">♡</span> お気に入り
  </button>
  <button class="btn-done" onclick="done()">✓ できた！</button>
</div>

<div class="div" id="div"></div>
<div class="fav-sec" id="favSec">
  <div class="fav-ttl">✦ ここまでのヒトオシ</div>
  <div class="fav-indicator" id="favIndicator"></div>
  <div class="fav-stage" id="favStage"></div>
  <div class="fav-nav-row">
    <button class="fav-nav-btn" id="favPrev" onclick="navFav(-1)" aria-label="前へ">‹</button>
    <button class="fav-nav-btn" id="favNext" onclick="navFav(1)" aria-label="次へ">›</button>
  </div>
</div>

<div class="div" style="margin-top:8px"></div>
<div class="cal-sec">
  <button class="cal-toggle" id="calToggle" aria-expanded="false" aria-controls="calBody">
    <span>ここまで来た日</span>
    <span class="cal-arrow">▾</span>
  </button>
  <div class="cal-body" id="calBody" role="region" aria-label="カレンダー"></div>
</div>

<div class="cel" id="cel" aria-hidden="true"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
// ── Message Data ──
const D = {
  "だるい":{
    "出勤前":        {m:"だるいままでいいよ。だるいまま着替えた人、えらい。",           a:"服を1枚だけ選んでみる"},
    "通勤中":        {m:"だるいまま乗れてるじゃん。それだけで今日の主役。",            a:"窓の外を5秒だけぼーっと見てみる"},
    "仕事前":        {m:"だるくても席についてれば、それでOKです今日は。",             a:"お茶かお水をひとくち飲む"},
    "昼休み中":      {m:"午前中よく来たよ。だるいのに来たんだから。",                 a:"目を5秒だけ閉じてみる"},
    "午後つらいとき": {m:"あとちょっとだけ、だるいまま座ってればいい。",              a:"背筋だけちょっと伸ばしてみる"}

// ── Audio ──
function ac(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  return actx;
}
function playPop(){
  if(!soundOn)return;
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(680,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(960,c.currentTime+.07);
    g.gain.setValueAtTime(.2,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.26);
    o.start(c.currentTime);o.stop(c.currentTime+.26);
  }catch(e){}
}
function playWin(){
  if(!soundOn)return;
  try{
    const c=ac();
    [523,659,784,1047].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;
      const t=c.currentTime+i*.11;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.16,t+.03);
      g.gain.exponentialRampToValueAtTime(.001,t+.38);
      o.start(t);o.stop(t+.38);
    });
  }catch(e){}
}

// ── Haptics ──
function vib(pat){if(!soundOn||!navigator.vibrate)return;navigator.vibrate(pat);}

// ── Typewriter：速度改善・行動提案は65%タイミングで表示 ──
function typeWriter(el, text, onMidway){
  if(typeTimer){clearTimeout(typeTimer);typeTimer=null;}
  el.textContent='';
  document.getElementById('cActRow').style.opacity='0';
  let i=0, midFired=false;
  const speed=20, midAt=Math.floor(text.length*.65);
  function next(){
    if(i<text.length){
      el.textContent+=text[i++];
      if(!midFired&&i>=midAt){midFired=true;if(onMidway)onMidway();}
      typeTimer=setTimeout(next,speed);
    } else {
      typeTimer=null;
      if(!midFired&&onMidway)onMidway();
    }
  }
  next();
}

// ── Date label ──
function formatGentleDate(ts){
  if(!ts)return'';
  const diff=Date.now()-ts, days=diff/86400000;
  const h=new Date(ts).getHours();
  const tod=h>=5&&h<10?'朝':h>=10&&h<14?'お昼ごろ':h>=14&&h<18?'午後':h>=18&&h<22?'夜':'夜中';
  if(diff<120000)return'さっき';
  if(days<1)return`今日の${tod}`;
  if(days<2)return`昨日の${tod}`;
  if(days<4)return`${Math.floor(days)}日前の${tod}`;
  if(days<8)return`先週の${tod}`;
  if(days<15)return`2週間前の${tod}`;
  return`少し前の${tod}`;
}

// ── Carousel ──
function renderFavCarousel(){
  const sec=document.getElementById('favSec'),dv=document.getElementById('div');
  if(!favs.length){sec.classList.remove('vis');dv.style.display='none';return;}
  sec.classList.add('vis');dv.style.display='block';

function buildFavCard(f,idx){
  const dt=formatGentleDate(f.savedAt);
  return`<div class="fav-card">
    <div class="fav-card-top">
      <div>
        <div class="fav-tag">${f.mood} × ${f.scene}</div>
        ${dt?`<div class="fav-date">${dt}</div>`:''}
      </div>
      <button class="fav-save" onclick="saveCardAsImage(${idx})" aria-label="画像で保存">🖼</button>
    </div>
    <div class="fav-msg">${f.m}</div>
    <div class="fav-bottom">
      <div class="fav-step">✦ ${f.a}</div>
      <button class="fav-del" aria-label="削除（長押し）">×</button>
    </div>
  </div>`;
}
function bindFavCard(stage,idx){
  const del=stage.querySelector('.fav-del');
  if(del){
    del.addEventListener('touchstart',()=>startLP(idx),{passive:true});
    del.addEventListener('mousedown',()=>startLP(idx));
    ['touchend','mouseup','mouseleave','touchmove'].forEach(ev=>del.addEventListener(ev,cancelLP,{passive:true}));
  }
  bindSwipe(stage);
}
function startLP(idx){cancelLP();lpTimer=setTimeout(()=>confirmDel(idx),600);}
function cancelLP(){if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}}
function navFav(dir){
  const ni=favIdx+dir;if(ni<0||ni>=favs.length)return;vib(8);
  const stage=document.getElementById('favStage');
  stage.style.transition='opacity .16s ease-out,transform .16s ease-out';
  stage.style.opacity='0';stage.style.transform=`translateX(${dir>0?'-20px':'20px'})`;
  setTimeout(()=>{
    favIdx=ni;
    document.getElementById('favIndicator').textContent=`ひと押しの記録 ${favIdx+1} / ${favs.length}`;
    document.getElementById('favPrev').disabled=favIdx===0;
    document.getElementById('favNext').disabled=favIdx===favs.length-1;
    stage.innerHTML=buildFavCard(favs[favIdx],favIdx);bindFavCard(stage,favIdx);
    stage.style.transition='none';stage.style.transform=`translateX(${dir>0?'20px':'-20px'})`;
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      stage.style.transition='opacity .28s ease-out,transform .28s ease-out';
      stage.style.opacity='1';stage.style.transform='translateX(0)';
    }));
  },180);
}
function bindSwipe(el){
  let sx=null;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',e=>{
    if(sx===null)return;const dx=e.changedTouches[0].clientX-sx;sx=null;
    if(Math.abs(dx)<40)return;navFav(dx<0?1:-1);
  },{passive:true});
}
function confirmDel(idx){
  const t=document.getElementById('toast');
  clearTimeout(toastTimer);t.classList.add('interact');
  t.innerHTML=`消しますか？ <button class="toast-del-btn" onclick="doDel(${idx})">消す</button>`;
  t.classList.add('on');
  toastTimer=setTimeout(()=>{t.classList.remove('on','interact');setTimeout(()=>{if(!t.classList.contains('on'))t.textContent='';},300);},3500);
}
function doDel(idx){
  const t=document.getElementById('toast');
  clearTimeout(toastTimer);t.classList.remove('on','interact');
  setTimeout(()=>{t.textContent='';},300);
  if(cur&&favs[idx]&&favs[idx].mood===cur.mood&&favs[idx].scene===cur.scene){faved=false;syncFav();}
  favs.splice(idx,1);if(favIdx>=favs.length)favIdx=Math.max(0,favs.length-1);
  localStorage.setItem('ht_f',JSON.stringify(favs));
  renderFavCarousel();playPop();setTimeout(()=>showToast('そっと消したよ'),100);
}

  el.innerHTML='';el.classList.add('on');
  const cols=['#C4B4D8','#E0B8C4','#F0C8A8','#C4D0BC','#B8D4E4','#F4D4DC'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div');d.className='dot';
    const s=6+Math.random()*7;
    d.style.cssText=`left:${Math.random()*100}vw;top:-14px;width:${s}px;height:${s}px;`
      +`background:${cols[i%cols.length]};`
      +`animation-duration:${1.2+Math.random()*.9}s;animation-delay:${Math.random()*.45}s;`;
    el.appendChild(d);
  }
  setTimeout(()=>{el.classList.remove('on');el.innerHTML='';},2500);
}

// ── Sound ──
function toggleSnd(){
  soundOn=!soundOn;
  document.getElementById('sndIco').textContent=soundOn?'🔔':'🔕';
  document.getElementById('sndTxt').textContent=soundOn?'応援あり':'そっと';
}

// ── Toast ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.remove('interact');t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('on'),2300);
}

// ── Calendar ──
function trackDay(){
  const today=new Date().toISOString().slice(0,10);
  const days=JSON.parse(localStorage.getItem('ht_days')||'[]');
  if(!days.includes(today)){days.push(today);localStorage.setItem('ht_days',JSON.stringify(days));}
  if(document.getElementById('calBody').classList.contains('open'))renderCalendar();
}
function renderCalendar(){
  const body=document.getElementById('calBody');if(!body)return;
  const days=new Set(JSON.parse(localStorage.getItem('ht_days')||'[]'));
  const now=new Date(),y=now.getFullYear(),mo=now.getMonth();
  const today=now.toISOString().slice(0,10);
  const firstDow=new Date(y,mo,1).getDay();
  const dim=new Date(y,mo+1,0).getDate();
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let h=`<div class="cal-month-label">${y}年 ${mn[mo]}</div><div class="cal-grid">
    ${'日月火水木金土'.split('').map(d=>`<div class="cal-dow">${d}</div>`).join('')}
    ${'_'.repeat(firstDow).split('').map(()=>'<div class="cal-day"></div>').join('')}`;
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const vis=days.has(ds),tod=ds===today;
    const cls=['cal-day',vis?'visited':'',tod?'today':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}">${vis||tod?d:''}</div>`;
  }
  body.innerHTML=h+'</div>';
}
document.getElementById('calToggle').addEventListener('click',function(){
  this.classList.toggle('cal-open');
  const body=document.getElementById('calBody');
  body.classList.toggle('open');
  this.setAttribute('aria-expanded',body.classList.contains('open'));
  if(body.classList.contains('open'))renderCalendar();
});

// ── Chip frequency sort ──
function trackChip(type,val){
  const k=type==='mood'?'ht_mood_count':'ht_scene_count';
  const c=JSON.parse(localStorage.getItem(k)||'{}');
  c[val]=(c[val]||0)+1;localStorage.setItem(k,JSON.stringify(c));
}
function sortChips(){
  [['moodC','ht_mood_count'],['sceneC','ht_scene_count']].forEach(([cid,k])=>{
    const counts=JSON.parse(localStorage.getItem(k)||'{}');
    const wrap=document.getElementById(cid);
    [...wrap.querySelectorAll('.chip')]
      .sort((a,b)=>(counts[b.dataset.v]||0)-(counts[a.dataset.v]||0))
      .forEach(c=>wrap.appendChild(c));
  });
}

// ── 時間帯グリーティング（appHookを差し替え） ──
function initGreeting(){
  const h=new Date().getHours();
  const el=document.getElementById('appHook');
  if(h>=5&&h<10)       el.textContent='おはよう。来てくれてありがとう。';
  else if(h>=10&&h<14)  el.textContent='仕事、ちょっとしんどい？';
  else if(h>=14&&h<18)  el.textContent='午後もがんばってるね、えらい。';
  else if(h>=18&&h<23)  el.textContent='今日もお疲れさまでした。';
  // 23〜5時はデフォルト（仕事、ちょっとしんどい？）のまま
}

// ── Onboarding ──
function showOnboarding(){
  if(localStorage.getItem('ht_onboarded'))return;
  let step=0;
  const ob=document.createElement('div');
  ob.className='onboard';ob.id='onboarding';
  ob.setAttribute('role','dialog');ob.setAttribute('aria-modal','true');
  ob.innerHTML=`
    <div class="ob-steps-wrap">
      <div class="ob-step on" id="ob0">
        <div class="ob-icon">✦</div>
        <div class="ob-txt">ちょっとしんどい日に、<br>来てくれてありがとう。</div>
      </div>
      <div class="ob-step" id="ob1">
        <div class="ob-txt">気分と、いまどこ、<br>を選ぶだけ。</div>
        <div class="ob-chips-demo">
          <div class="ob-chip hi">😪 だるい</div>
          <div class="ob-chip">💤 眠い</div>
          <div class="ob-chip hi">🚃 通勤中</div>
          <div class="ob-chip">☕ 昼休み中</div>
        </div>
      </div>
      <div class="ob-step" id="ob2">
        <div class="ob-icon">🌸</div>
        <div class="ob-txt">✦ 無理しない、<br>が合言葉です。</div>
        <button class="ob-start" onclick="closeOb()">はじめる</button>
      </div>
    </div>
    <div class="ob-bottom">
      <div class="ob-dots">
        <div class="ob-dot on"></div><div class="ob-dot"></div><div class="ob-dot"></div>
      </div>
      <button class="ob-skip" onclick="closeOb()">スキップ</button>
    </div>`;
  document.body.appendChild(ob);
  ob.addEventListener('click',e=>{
    if(e.target.closest('.ob-start')||e.target.closest('.ob-skip'))return;
    if(step<2)goOb(ob,++step);
  });
  setTimeout(()=>{if(step===0)goOb(ob,++step);},3000);
}
function goOb(ob,s){
  ob.querySelectorAll('.ob-step').forEach(el=>el.classList.remove('on'));
  ob.querySelectorAll('.ob-dot').forEach((d,i)=>d.classList.toggle('on',i===s));
  const el=ob.querySelector(`#ob${s}`);if(el)el.classList.add('on');
}
function closeOb(){
  localStorage.setItem('ht_onboarded','1');
  const ob=document.getElementById('onboarding');if(!ob)return;
  ob.style.transition='opacity .4s';ob.style.opacity='0';
  setTimeout(()=>ob.remove(),400);
}

// ── Init ──
sortChips();
initGreeting();
renderFavCarousel();
showOnboarding();
</script>
