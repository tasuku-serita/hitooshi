<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ヒトオシ — しんどい日のやさしい1タップ</title>
<style>
:root {
  --cr: #FDF5EC;
  --lv: #C4B4D8;
  --lv-l: #EDE8F5;
  --lv-m: #B0A0CC;
  --lv-d: #9A86B6;
  --pk: #E0B8C4;
  --pk-l: #F8ECF0;
  --pk-m: #C89AAC;
  --pk-d: #B88A9C;
  --be: #E8DDD0;
  --be-d: #D0C0B0;
  --tx: #4E3E4C;
  --tx-m: #7A6878;
  --tx-s: #A898A8;
  --wh: #FFFFFF;
  --sh: 0 4px 24px rgba(130,90,120,.11);
  --sh-s: 0 2px 10px rgba(130,90,120,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--cr);
  background-image:
    radial-gradient(ellipse at 12% 88%, rgba(196,180,216,.17) 0%, transparent 52%),
    radial-gradient(ellipse at 88% 12%, rgba(224,184,196,.17) 0%, transparent 52%);
  font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  color:var(--tx);
  min-height:100vh;
  padding:0 16px calc(64px + max(8px,env(safe-area-inset-bottom,8px)));
  max-width:480px;
  margin:0 auto;
}

/* ── Header ── */
.hd{
  padding:36px 4px 26px;
  position:relative;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.snd-btn{
  position:absolute;top:36px;right:4px;
  background:var(--wh);border:none;border-radius:20px;
  padding:6px 12px;font-size:11px;color:var(--tx-s);
  cursor:pointer;display:flex;align-items:center;gap:4px;
  box-shadow:var(--sh-s);transition:box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
}
.snd-btn:hover{box-shadow:0 3px 14px rgba(130,90,120,.17)}
.logo{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--lv) 0%,var(--pk) 100%);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:#fff;
  box-shadow:0 3px 10px rgba(170,130,190,.26);
  margin-bottom:2px;
}
.app-name{font-size:26px;font-weight:800;letter-spacing:.18em;color:var(--tx)}
.app-hook{
  font-size:15px;font-weight:700;color:var(--tx);
  letter-spacing:.02em;line-height:1.5;text-align:center;
  margin-top:3px;
}
.app-sub{
  font-size:11px;color:var(--tx-s);
  letter-spacing:.03em;line-height:1.6;text-align:center;
  margin-top:1px;
}
.counter-line{
  font-size:11px;color:var(--tx-s);letter-spacing:.04em;
  margin-top:4px;display:none;
}
#counterNum{
  display:inline-block;
  transition:color .3s;
}
#counterNum.bump{animation:numBump .55s cubic-bezier(.34,1.56,.64,1)}
@keyframes numBump{
  0%{transform:translateY(0) scale(1);opacity:1}
  35%{transform:translateY(-5px) scale(1.18);opacity:.7}
  100%{transform:translateY(0) scale(1);opacity:1}
}

/* ── Section ── */
.sec{margin-bottom:20px}
.lbl{
  font-size:10.5px;font-weight:700;color:var(--tx-s);
  letter-spacing:.16em;text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:7px;
}
.lbl::after{content:'';flex:1;height:1px;background:var(--be)}

/* ── Chips ── */
.chips{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chip{
  background:var(--wh);border:1.5px solid var(--be);border-radius:14px;
  padding:12px 8px 10px;
  font-size:12px;color:var(--tx-m);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  min-height:62px;
  transition:background .16s,border-color .16s,color .16s,box-shadow .16s,transform .12s,opacity .16s;
  user-select:none;-webkit-tap-highlight-color:transparent;
  box-shadow:var(--sh-s);
  line-height:1.3;text-align:center;
}
.chip-ico{font-size:22px;line-height:1;display:block}
.chip-txt{font-size:12px;display:block}
.chip:active{transform:scale(.95)}
.mood-chips .chip.on{
  background:var(--lv-l);border-color:var(--lv);color:var(--lv-d);font-weight:600;
  box-shadow:0 3px 12px rgba(160,140,210,.22);
}
.scene-chips .chip.on{
  background:var(--pk-l);border-color:var(--pk);color:var(--pk-d);font-weight:600;
  box-shadow:0 3px 12px rgba(200,154,172,.22);
}
.chips.dimmed .chip:not(.on){opacity:.42;transform:scale(.97)}
.scene-chips .chip:last-child{
  grid-column: 1 / -1;
  flex-direction: row;
  gap: 10px;
  min-height: 48px;
  padding: 10px 16px;
  justify-content: center;
}
.chip-hidden{display:none}
.mood-expanded .chip-hidden{display:flex}
.chip-more{
  width:100%;margin-top:6px;
  background:none;border:1.5px dashed var(--be-d);border-radius:12px;
  padding:8px;font-size:12px;color:var(--tx-s);
  cursor:pointer;text-align:center;
  transition:background .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.chip-more:hover{background:var(--lv-l);border-color:var(--lv)}

/* ── Main Button ── */
.btn-wrap{padding:4px 0 18px}
.main-btn{
  width:100%;
  background:linear-gradient(135deg,var(--lv-m) 0%,var(--pk-m) 100%);
  border:none;border-radius:26px;
  padding:17px 24px;
  font-size:15.5px;font-weight:700;color:#fff;
  cursor:pointer;letter-spacing:.08em;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 5px 20px rgba(175,125,165,.33);
  -webkit-tap-highlight-color:transparent;
}
.main-btn:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(175,125,165,.42)}
.main-btn:active{transform:translateY(1px);box-shadow:0 3px 12px rgba(175,125,165,.26)}

/* ── Result Card ── */
.card{
  background:#FFFAF5;border-radius:22px;
  padding:28px 22px 24px;
  margin-bottom:12px;
  box-shadow:0 8px 36px rgba(200,140,100,.18);
  border:2.5px solid #E8C8A8;
  display:none;opacity:0;transform:translateY(14px);
  transition:opacity .36s ease,transform .36s ease;
  position:relative;overflow:hidden;
}
.card.vis{display:block}
.card.in{opacity:1;transform:translateY(0)}
.card-bar{
  position:absolute;top:0;left:0;right:0;height:10px;
  background:linear-gradient(90deg,#D4A8C8 0%,#E8B88C 100%);
}
.card-body{display:flex;gap:12px;align-items:flex-start}
.card-texts{flex:1;min-width:0}
.c-msg{
  font-size:18px;line-height:2.0;color:var(--tx);font-weight:700;
  margin-bottom:22px;min-height:2.2em;
  letter-spacing:.02em;
}
.c-act-row{
  display:flex;align-items:stretch;
  border-radius:14px;overflow:hidden;
  border:2px solid #E8C0A0;
  background:#FFF3E8;
  opacity:0;
  transition:opacity .35s ease;
  box-shadow:0 3px 12px rgba(220,160,100,.18);
}
.c-act-icon{
  width:40px;flex-shrink:0;
  background:linear-gradient(160deg,#E8B88C,#D4A0A0);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#fff;font-weight:700;
}
.c-act-text{
  padding:13px 14px;
  font-size:14px;color:#6A4E3C;line-height:1.6;font-weight:600;
  flex:1;
}
.retry-btn{
  display:none;align-items:center;justify-content:center;gap:5px;
  margin-top:10px;
  background:none;border:1.5px dashed #D0B8A8;border-radius:10px;
  padding:8px 14px;font-size:12px;color:#8A6858;
  cursor:pointer;width:100%;
  transition:background .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.retry-btn.vis{display:flex}
.retry-btn:hover{background:#FFF3E8;border-color:#C0A090}

/* マスコット */
.mascot-box{
  width:52px;flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:center;
  padding-top:4px;padding-bottom:2px;
}
.mascot{
  width:48px;height:48px;
  object-fit:contain;object-position:center;
  opacity:.75;transition:opacity .3s;
}
.mascot.pop{animation:mpop .55s cubic-bezier(.34,1.56,.64,1);opacity:1}
@keyframes mpop{
  0%{transform:scale(1) rotate(0)}
  38%{transform:scale(1.38) rotate(-8deg)}
  68%{transform:scale(.91) rotate(4deg)}
  100%{transform:scale(1) rotate(0)}
}

/* ── Particles ── */
.c-particle{
  position:absolute;border-radius:50%;
  opacity:0;pointer-events:none;
  will-change:transform,opacity;
  animation:particleUp 1.8s ease-out forwards;
}
@keyframes particleUp{
  0%{opacity:0;transform:translate3d(0,0,0)}
  20%{opacity:.55}
  80%{opacity:.35}
  100%{opacity:0;transform:translate3d(0,-58px,0)}
}

/* ── Flower ── */
.flower-svg{
  position:absolute;top:50%;left:50%;
  width:100px;height:100px;overflow:visible;
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;z-index:10;
  animation:flowerBloom .9s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes flowerBloom{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  12%{opacity:1}
  75%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.06)}
}
.f-p{opacity:0;animation:fPIn .55s ease-out forwards}
.f-p:nth-child(2){animation-delay:.07s}
.f-p:nth-child(3){animation-delay:.14s}
.f-p:nth-child(4){animation-delay:.21s}
.f-p:nth-child(5){animation-delay:.28s}
.f-ctr{opacity:0;animation:fPIn .4s ease-out .16s forwards}
@keyframes fPIn{to{opacity:1}}

/* ── Action Buttons ── */
.act-btns{display:none;gap:9px;margin-bottom:14px}
.act-btns.vis{display:flex}
.btn-fav{
  flex:1;background:var(--wh);border:1.5px solid var(--be);border-radius:18px;
  padding:11px 8px;font-size:13px;color:var(--tx-s);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
  box-shadow:var(--sh-s);
}
.btn-fav.on{background:var(--pk-l);border-color:var(--pk);color:var(--pk-m)}
.btn-done{
  flex:2;
  background:linear-gradient(135deg,#ECD4F4 0%,#F4D4DC 100%);
  border:none;border-radius:18px;
  padding:12px 8px;
  font-size:14px;font-weight:700;color:var(--tx);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 14px rgba(175,145,195,.2);
  -webkit-tap-highlight-color:transparent;
}
.btn-done:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(175,145,195,.3)}
.btn-done:active{transform:translateY(1px)}

/* ── Scroll link ── */
.scroll-link-wrap{text-align:center;margin-bottom:16px;display:none}
.scroll-link{
  background:none;border:none;
  font-size:12px;color:var(--tx-s);cursor:pointer;
  padding:4px 8px;
  -webkit-tap-highlight-color:transparent;
  text-decoration:underline;text-underline-offset:3px;
}

/* ── Divider ── */
.div{height:1px;background:linear-gradient(90deg,transparent,var(--be),transparent);margin:4px 0 22px;display:none}

/* ── History ── */
.history-sec{margin-bottom:18px;display:none}
.history-stats{display:flex;gap:10px;margin-bottom:6px}
.hist-item{
  background:var(--wh);border-radius:14px;padding:12px 16px;
  display:flex;flex-direction:column;align-items:center;flex:1;
  box-shadow:var(--sh-s);
}
.hist-num{font-size:24px;font-weight:800;color:var(--lv-d);line-height:1.1}
.hist-label{font-size:10px;color:var(--tx-s);margin-top:2px;text-align:center}
.hist-combo{font-size:11px;color:var(--tx-m);padding:8px 12px;background:var(--lv-l);border-radius:10px;margin-top:6px}

/* ── Favorites Carousel ── */
.fav-sec{display:none;padding-bottom:8px}
.fav-sec.vis{display:block}
.fav-ttl{font-size:10.5px;font-weight:700;color:var(--tx-s);letter-spacing:.16em;margin-bottom:10px}
.fav-indicator{font-size:10px;color:var(--tx-s);margin-bottom:8px;min-height:14px}
.fav-stage{position:relative;overflow:hidden;transition:opacity .15s ease-out,transform .15s ease-out}
.fav-card{background:var(--wh);border-radius:16px;padding:14px 13px;box-shadow:0 2px 10px rgba(130,90,120,.08)}
.fav-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.fav-tag{font-size:10px;color:var(--tx-s)}
.fav-date{font-size:9.5px;color:var(--tx-s);opacity:.7;margin-top:2px}
.fav-msg{font-size:12.5px;color:var(--tx-m);line-height:1.55;margin:6px 0}
.fav-bottom{display:flex;align-items:center;justify-content:space-between}
.fav-step{font-size:10px;color:var(--pk-m)}
.fav-del{
  background:none;border:none;color:var(--be-d);cursor:pointer;
  font-size:16px;line-height:1;padding:2px 4px;
  transition:color .15s;user-select:none;-webkit-tap-highlight-color:transparent;
}
.fav-del:hover{color:var(--pk-m)}
.fav-save{
  background:none;border:none;font-size:11px;color:var(--tx-s);
  cursor:pointer;padding:2px 4px;transition:color .15s;-webkit-tap-highlight-color:transparent;
}
.fav-save:hover{color:var(--pk-m)}
.fav-nav-row{display:flex;justify-content:center;gap:16px;margin-top:10px}
.fav-nav-btn{
  background:none;border:1.5px solid var(--be);border-radius:50%;
  width:30px;height:30px;font-size:15px;color:var(--tx-s);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
}
.fav-nav-btn:hover:not(:disabled){border-color:var(--pk);color:var(--pk-m)}
.fav-nav-btn:disabled{opacity:.28;cursor:default}

/* ── Confetti ── */
.cel{position:fixed;inset:0;pointer-events:none;z-index:999;display:none}
.cel.on{display:block}
.dot{position:absolute;border-radius:50%;animation:fall linear forwards}
@keyframes fall{
  0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}
  80%{opacity:1}
  100%{opacity:0;transform:translateY(100vh) scale(.35) rotate(540deg)}
}

/* ── Toast ── */
.toast{
  position:fixed;
  bottom:max(28px,env(safe-area-inset-bottom,28px));
  left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(70,55,68,.88);color:#fff;
  padding:9px 18px;border-radius:18px;font-size:12.5px;
  opacity:0;transition:opacity .24s,transform .24s;
  pointer-events:none;z-index:1000;
  backdrop-filter:blur(8px);white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.interact{pointer-events:auto}
.toast-del-btn{
  background:var(--pk-m);color:#fff;border:none;border-radius:10px;
  padding:3px 10px;font-size:11px;cursor:pointer;margin-left:6px;vertical-align:middle;
}

/* ── Onboarding ── */
.onboard{
  position:fixed;inset:0;z-index:2000;background:var(--cr);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px max(40px,env(safe-area-inset-bottom,40px));text-align:center;
}
.ob-steps-wrap{position:relative;flex:1;width:100%;display:flex;align-items:center;justify-content:center}
.ob-step{
  position:absolute;width:100%;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  opacity:0;pointer-events:none;transition:opacity .4s ease;
}
.ob-step.on{opacity:1;pointer-events:auto}
.ob-icon{font-size:46px}
.ob-txt{font-size:19px;font-weight:800;color:var(--tx);line-height:1.55;letter-spacing:.02em}
.ob-chips-demo{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.ob-chip{background:var(--wh);border:1.5px solid var(--be);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--tx-m)}
.ob-chip.hi{background:var(--lv);border-color:var(--lv);color:#fff}
.ob-next{
  background:var(--lv-l);border:1.5px solid var(--lv);border-radius:16px;
  padding:10px 28px;font-size:14px;font-weight:700;color:var(--lv-d);
  cursor:pointer;margin-top:4px;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s;
}
.ob-next:hover{background:var(--lv)}
.ob-bottom{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}
.ob-dots{display:flex;gap:8px}
.ob-dot{width:7px;height:7px;border-radius:50%;background:var(--be);transition:background .3s;cursor:pointer}
.ob-dot.on{background:var(--lv)}
.ob-start{
  width:100%;max-width:260px;
  background:linear-gradient(135deg,var(--lv-m),var(--pk-m));
  border:none;border-radius:22px;padding:14px 24px;
  font-size:15px;font-weight:700;color:#fff;cursor:pointer;
  box-shadow:0 4px 16px rgba(175,125,165,.3);-webkit-tap-highlight-color:transparent;
}
.ob-skip{background:none;border:none;font-size:11.5px;color:var(--tx-s);cursor:pointer;padding:4px}

/* ── Tab Bar ── */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  display:flex;
  background:rgba(253,245,236,.94);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--be);
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:100;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:10px 4px 8px;
  background:none;border:none;cursor:pointer;
  font-size:10px;color:var(--tx-s);letter-spacing:.04em;
  transition:color .18s;-webkit-tap-highlight-color:transparent;
}
.tab-btn.active{color:var(--lv-d);font-weight:700}
.tab-ico{font-size:20px;line-height:1;display:block}
.tab-badge{
  position:absolute;top:6px;right:calc(50% - 18px);
  background:var(--pk-m);color:#fff;
  font-size:9px;font-weight:700;border-radius:8px;
  padding:1px 5px;min-width:14px;text-align:center;
  display:none;
}
.tab-badge.vis{display:block}

/* ── Tab Pages ── */
.tab-page{display:none}
.tab-page.active{display:block}

/* お気に入りページ専用 */
.fav-page-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.fav-page-title{font-size:18px;font-weight:800;color:var(--tx);letter-spacing:.04em}
.fav-page-count{font-size:11px;color:var(--tx-s)}
.fav-list{display:flex;flex-direction:column;gap:10px}
.fav-list-card{
  background:var(--wh);border-radius:16px;padding:14px 16px;
  box-shadow:var(--sh-s);
  position:relative;
}
.fav-list-tag{font-size:10px;color:var(--tx-s);margin-bottom:6px}
.fav-list-msg{font-size:13.5px;color:var(--tx);line-height:1.7;font-weight:600;margin-bottom:8px}
.fav-list-act{
  font-size:11.5px;color:var(--tx-m);
  background:var(--lv-l);border-radius:8px;padding:6px 10px;
  display:inline-block;
}
.fav-list-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:10px;
}
.fav-list-date{font-size:9.5px;color:var(--tx-s)}
.fav-list-del{
  background:none;border:none;color:var(--be-d);cursor:pointer;
  font-size:15px;padding:2px 4px;transition:color .15s;
  -webkit-tap-highlight-color:transparent;
}
.fav-list-del:hover{color:var(--pk-m)}
.fav-empty{
  text-align:center;padding:48px 16px;
  color:var(--tx-s);font-size:13px;line-height:1.8;
}
.fav-empty-ico{font-size:36px;margin-bottom:12px;opacity:.5}

/* あしあとページ */
.ashiato-section{margin-bottom:24px}
.ashiato-title{font-size:18px;font-weight:800;color:var(--tx);letter-spacing:.04em;margin-bottom:16px}

.praise-hero{
  background:var(--wh);border-radius:20px;
  padding:24px 20px;margin-bottom:12px;
  box-shadow:var(--sh);text-align:center;
}
.praise-hero-num{
  font-size:52px;font-weight:800;color:var(--lv-d);
  line-height:1;letter-spacing:-.02em;margin-bottom:6px;
}
.praise-hero-msg{
  font-size:15px;font-weight:700;color:var(--tx);
  line-height:1.6;
}

.praise-cards{display:flex;flex-direction:column;gap:10px}
.praise-card{
  background:var(--wh);
  border-left:3px solid var(--lv);
  border-radius:0 16px 16px 0;

// ── Audio ──
function ac(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  return actx;
}
function playPop(){
  if(!soundOn)return;
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';
    o.frequency.setValueAtTime(680,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(960,c.currentTime+.07);
    g.gain.setValueAtTime(.2,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.26);
    o.start(c.currentTime);o.stop(c.currentTime+.26);
  }catch(e){}
}
function playWin(){
  if(!soundOn)return;
  try{
    const c=ac();
    [523,659,784,1047].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;
      const t=c.currentTime+i*.11;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.16,t+.03);
      g.gain.exponentialRampToValueAtTime(.001,t+.38);
      o.start(t);o.stop(t+.38);
    });
  }catch(e){}
}

// ── Typewriter ──
function typeWriter(el, text, onMidway){
  if(typeTimer){clearTimeout(typeTimer);typeTimer=null;}
  el.textContent='';
  document.getElementById('cActRow').style.opacity='0';
  let i=0, midFired=false;
  const speed=20, midAt=Math.floor(text.length*.65);
  function next(){
    if(i<text.length){
      el.textContent+=text[i++];
      if(!midFired&&i>=midAt){midFired=true;if(onMidway)onMidway();}
      typeTimer=setTimeout(next,speed);
    } else {
      typeTimer=null;
      if(!midFired&&onMidway)onMidway();
    }
  }
  next();
}

// ── Date label ──
function formatGentleDate(ts){
  if(!ts)return'';
  const diff=Date.now()-ts, days=diff/86400000;
  const h=new Date(ts).getHours();
  const tod=h>=5&&h<10?'朝':h>=10&&h<14?'お昼ごろ':h>=14&&h<18?'午後':h>=18&&h<22?'夜':'夜中';
  if(diff<120000)return'さっき';
  if(days<1)return`今日の${tod}`;
  if(days<2)return`昨日の${tod}`;
  if(days<4)return`${Math.floor(days)}日前の${tod}`;
  if(days<8)return`先週の${tod}`;
  if(days<15)return`2週間前の${tod}`;
  return`少し前の${tod}`;
}

      <div style="height:3px;background:linear-gradient(90deg,#C4B4D8,#E0B8C4);margin:-20px -18px 14px;border-radius:16px 16px 0 0"></div>
      <div style="font-size:10px;color:#A898A8;margin-bottom:6px">${f.mood} × ${f.scene}</div>
      <div style="font-size:13.5px;line-height:1.8;margin-bottom:12px">${msg}</div>
      <div style="display:flex;border-radius:10px;overflow:hidden;border:1.5px solid #E0B8C4;margin-bottom:10px">
        <div style="width:32px;background:#E0B8C4;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700">▷</div>
        <div style="padding:8px 11px;font-size:12px;color:#7A6878">${act}</div>
      </div>
      <div style="text-align:right;font-size:9.5px;color:#A898A8">#ヒトオシ ✦</div>`;
    document.body.appendChild(el);
    html2canvas(el,{backgroundColor:'#ffffff',scale:2}).then(canvas=>{
      const a=document.createElement('a');
      a.download='hitooshi.png';a.href=canvas.toDataURL('image/png');a.click();
      document.body.removeChild(el);showToast('画像を保存したよ 💕');
    }).catch(()=>{document.body.removeChild(el);showToast('保存できなかった…ごめんね');});
  }
  if(typeof html2canvas==='undefined'){
    showToast('読み込み中…');
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload=doSave;s.onerror=()=>showToast('接続が必要です');
    document.head.appendChild(s);
  } else doSave();
}

function done(){

function confetti(){
  const el=document.getElementById('cel');
  el.innerHTML='';el.classList.add('on');
  const cols=['#C4B4D8','#E0B8C4','#F0C8A8','#C4D0BC','#B8D4E4','#F4D4DC'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div');d.className='dot';
    const s=6+Math.random()*7;
    d.style.cssText=`left:${Math.random()*100}vw;top:-14px;width:${s}px;height:${s}px;`

// ── Toast ──
function showToast(msg){

// ── History (改修1 + 改修10) ──
function trackDay(){
  const today=new Date().toISOString().slice(0,10);
  const days=JSON.parse(localStorage.getItem('ht_days')||'[]');
  if(!days.includes(today))days.unshift(today);
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
  const cutStr=cutoff.toISOString().slice(0,10);
  localStorage.setItem('ht_days',JSON.stringify(days.filter(d=>d>=cutStr)));
}
function trackCombo(m,s){
  const c=JSON.parse(localStorage.getItem('ht_combo_count')||'{}');
  const k=`${m}×${s}`;c[k]=(c[k]||0)+1;
  localStorage.setItem('ht_combo_count',JSON.stringify(c));
}
function trackTotal(){
  const t=parseInt(localStorage.getItem('ht_total')||'0')+1;
  localStorage.setItem('ht_total',String(t));
}
function renderHistory(){
  const total=parseInt(localStorage.getItem('ht_total')||'0');
  const sec=document.getElementById('historySec');
  if(!sec)return;
  if(total===0){sec.style.display='none';return;}
  sec.style.display='block';
  const days=JSON.parse(localStorage.getItem('ht_days')||'[]');
  const combos=JSON.parse(localStorage.getItem('ht_combo_count')||'{}');
  const today=new Date();
  let visitedCount=0;
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    if(days.includes(d.toISOString().slice(0,10)))visitedCount++;
  }
  let topCombo='',topCount=0;
  Object.entries(combos).forEach(([k,v])=>{if(v>topCount){topCount=v;topCombo=k;}});
  document.getElementById('historyContent').innerHTML=`
    <div class="history-stats">
      <div class="hist-item"><span class="hist-num">${total}</span><span class="hist-label">回のヒトオシ</span></div>
      <div class="hist-item"><span class="hist-num">${visitedCount}</span><span class="hist-label">日 / 直近7日間</span></div>
    </div>
    ${topCount>=3?`<div class="hist-combo">よく選ぶ組み合わせ: ${topCombo} (${topCount}回)</div>`:''}`;
}

// ── Chip frequency sort ──
function trackChip(type,val){
  const k=type==='mood'?'ht_mood_count':'ht_scene_count';
  const c=JSON.parse(localStorage.getItem(k)||'{}');
  c[val]=(c[val]||0)+1;localStorage.setItem(k,JSON.stringify(c));
}
function sortChips(){
  [['moodC','ht_mood_count'],['sceneC','ht_scene_count']].forEach(([cid,k])=>{
    const counts=JSON.parse(localStorage.getItem(k)||'{}');
    const wrap=document.getElementById(cid);
    const visible=[...wrap.querySelectorAll('.chip:not(.chip-hidden)')];
    const hidden=[...wrap.querySelectorAll('.chip.chip-hidden')];
    visible.sort((a,b)=>(counts[b.dataset.v]||0)-(counts[a.dataset.v]||0))
      .forEach(c=>wrap.appendChild(c));
    hidden.forEach(c=>wrap.appendChild(c));
  });
}

// ── 時間帯グリーティング ──
function initGreeting(){
  const h=new Date().getHours();

  else if(h>=18&&h<23)  el.textContent='今日もお疲れさまでした。';
}

      </div>

        </div>

        <div class="ob-txt">✦ 無理しない、<br>が合言葉です。</div>

function goOb(ob,s){
  ob.querySelectorAll('.ob-step').forEach(el=>el.classList.remove('on'));
  ob.querySelectorAll('.ob-dot').forEach((d,i)=>d.classList.toggle('on',i===s));
  const el=ob.querySelector(`#ob${s}`);if(el)el.classList.add('on');
}
function closeOb(){
  localStorage.setItem('ht_onboarded','1');
  const ob=document.getElementById('onboarding');if(!ob)return;
  ob.style.transition='opacity .4s';ob.style.opacity='0';
  setTimeout(()=>{
    ob.remove();
    if(!localStorage.getItem('ht_snd_tip_shown')){
      localStorage.setItem('ht_snd_tip_shown','1');
      setTimeout(()=>showToast('音と振動の切替だよ 🔔'),400);
    }
  },400);
}

// ── Counter (改修11) ──
const MILESTONES={
  5:'5回、ヒトオシを受け取ってきたね。それだけでいい。',
  10:'10回。しんどい日を10回、越えてきた。',
  20:'20回。あなたはちゃんと、自分を労ってる。',
  50:'50回。ほんとうに、えらい。',
  100:'100回目。ここまで来てくれて、ありがとう。'
};
function updateCounter(){
  const total=parseInt(localStorage.getItem('ht_total')||'0');
  const line=document.getElementById('counterLine');
  const num=document.getElementById('counterNum');
  if(total===0){line.style.display='none';return;}
  line.style.display='block';
  num.textContent=total;
}
function animateCounter(){
  const num=document.getElementById('counterNum');
  if(!num)return;
  num.classList.remove('bump');
  void num.offsetWidth;
  num.classList.add('bump');
  setTimeout(()=>num.classList.remove('bump'),700);
}
function checkMilestone(total){
  if(!MILESTONES[total])return;
  const done=JSON.parse(localStorage.getItem('ht_milestones')||'[]');
  if(done.includes(total))return;
  done.push(total);
  localStorage.setItem('ht_milestones',JSON.stringify(done));
  showToastLong(MILESTONES[total]);
}
function showToastLong(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.remove('interact');t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('on'),4000);
}

// ── タブ切り替え ──
function switchTab(name){
  ['home','fav','ashiato'].forEach(t=>{
    document.getElementById('page-'+t).classList.toggle('active', t===name);
    const btn=document.getElementById('tab-'+t);
    btn.classList.toggle('active', t===name);
    btn.setAttribute('aria-selected', t===name ? 'true' : 'false');
  });
  if(name==='fav') renderFavList();
  if(name==='ashiato') renderAshiato();
}

// ── お気に入りリスト（縦スクロール）──
function renderFavList(){
  const area=document.getElementById('favListArea');
  const countEl=document.getElementById('favPageCount');
  if(!favs.length){
    countEl.textContent='';
    area.innerHTML=`<div class="fav-empty"><div class="fav-empty-ico">♡</div>気に入った言葉を<br>ひと押し後に保存すると<br>ここに並ぶよ</div>`;
    updateFavBadge();
    return;
  }
  countEl.textContent=favs.length+'件';
  area.innerHTML=favs.map((f,i)=>{
    const msg=Array.isArray(f.m)?f.m[0]:f.m;
    const act=Array.isArray(f.a)?f.a[0]:f.a;
    const dt=formatGentleDate(f.savedAt);
    return`<div class="fav-list-card">
      <div class="fav-list-tag">${f.mood} × ${f.scene}</div>
      <div class="fav-list-msg">${msg}</div>
      <div class="fav-list-act">✦ ${act}</div>
      <div class="fav-list-footer">
        <span class="fav-list-date">${dt}</span>
        <button class="fav-list-del" aria-label="削除" onclick="delFavItem(${i})">×</button>
      </div>
    </div>`;
  }).join('');
  updateFavBadge();
}

function delFavItem(idx){
  if(cur&&favs[idx]&&favs[idx].mood===cur.mood&&favs[idx].scene===cur.scene&&(favs[idx].msgIdx||0)===(cur.msgIdx||0)){
    faved=false;syncFav();
  }
  favs.splice(idx,1);
  localStorage.setItem('ht_f',JSON.stringify(favs));
  renderFavList();
  showToast('そっと消したよ');
}

function updateFavBadge(){
  const badge=document.getElementById('favBadge');
  if(favs.length>0){
    badge.textContent=favs.length>99?'99+':favs.length;
    badge.classList.add('vis');
  } else {
    badge.classList.remove('vis');
  }
}

// ── あしあとページ ──
function renderAshiato(){
  const total=parseInt(localStorage.getItem('ht_total')||'0');
  const el=document.getElementById('ashiatoContent');
  if(total===0){
    el.innerHTML=`<div class="fav-empty"><div class="fav-empty-ico">✦</div>まだ記録がないよ。<br>ひと押しするたびに<br>ここに積み重なっていくよ</div>`;
    return;
  }

  const days=JSON.parse(localStorage.getItem('ht_days')||'[]');
  const combos=JSON.parse(localStorage.getItem('ht_combo_count')||'{}');
  const today=new Date();

  // 直近7日の訪問数
  let week=0;
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    if(days.includes(d.toISOString().slice(0,10)))week++;
  }

  // 一番多いコンボ
  let topCombo='',topCount=0;
  Object.entries(combos).forEach(([k,v])=>{if(v>topCount){topCount=v;topCombo=k;}});

  // ── ヒーロー文言 ──
  function heroMsg(n){
    if(n===1)  return 'はじめての一歩、ちゃんと踏み出した。';
    if(n<5)    return 'しんどい日に、ちゃんと来た。それだけでいい。';
    if(n<10)   return 'もう何度も乗り越えてきたね。';
    if(n<20)   return `${n}回。しんどい日を${n}回、越えてきた。`;
    if(n<50)   return `${n}回も、自分を助けに来た。えらい。`;
    if(n<100)  return `${n}回。ここまで来たあなた、本当にすごい。`;
    return `${n}回。もう「自分を大切にする人」だよ、あなたは。`;
  }

  // ── 週の文言 ──
  function weekMsg(n){
    if(n===0) return null;
    if(n===1) return {body:'先週も1日、来てくれた。',sub:'来なかった日も、それはそれでいい。'};
    if(n<=3)  return {body:`先週は${n}日、来てくれたね。`,sub:'しんどい中で来られた日のことを、ちゃんと覚えておいて。'};
    if(n<=5)  return {body:`先週は${n}日も来た。`,sub:'それだけ自分のことを気にかけてたってこと。'};
    return {body:'先週はほぼ毎日来てくれた。',sub:'毎日しんどかったかもしれないけど、毎日ちゃんと向き合ってた。'};
  }

  // ── コンボ文言 ──
  function comboMsg(combo,count){
    if(!combo||count<2) return null;
    const [mood]=combo.split('×');
    return {
      body:`「${combo.trim()}」が${count}回いちばん多い。`,
      sub:`${mood.trim()}な日でも、来ようとしてたんだね。`
    };
  }

  // ── 過去の言葉：お気に入りからランダム ──
  function mirrorCard(){
    const f=JSON.parse(localStorage.getItem('ht_f')||'[]');
    if(!f.length) return '';
    const item=f[Math.floor(Math.random()*f.length)];
    const msg=Array.isArray(item.m)?item.m[0]:item.m;
    const tag=`${item.mood} × ${item.scene}`;
    return `
      <div class="mirror-card" id="mirrorCard">
        <div class="mirror-label">あのとき受け取った言葉</div>
        <div class="mirror-quote">${msg}</div>
        <div class="mirror-tag">${tag}</div>
        <button class="mirror-refresh" onclick="refreshMirror()">↻ 別の言葉を見る</button>
      </div>`;
  }

  // ── 花ドット30日 ──
  function flowerDots(){
    const dots=[];
    for(let i=29;i>=0;i--){
      const d=new Date(today);
      d.setDate(d.getDate()-i);
      const key=d.toISOString().slice(0,10);
      const on=days.includes(key);
      dots.push(`<div class="flower-dot ${on?'on':'off'}">${on?'✿':'·'}</div>`);
    }
    return `
      <div class="dots-section">
        <div class="dots-label">直近30日のあしあと</div>
        <div class="dots-grid">${dots.join('')}</div>
        <div class="dots-note">花が咲いている日は、ちゃんと来た日だよ。<br>来られなかった日も、それでいい。</div>
      </div>`;
  }

  const wMsg=weekMsg(week);
  const cMsg=comboMsg(topCombo,topCount);
  const cards=[wMsg,cMsg].filter(Boolean).map(c=>`
    <div class="praise-card">
      <div class="praise-card-body">${c.body}</div>
      <div class="praise-card-sub">${c.sub}</div>
    </div>`).join('');

  el.innerHTML=`
    <div class="praise-hero">
      <div class="praise-hero-num">${total}</div>
      <div class="praise-hero-msg">${heroMsg(total)}</div>
    </div>
    ${mirrorCard()}
    ${cards?`<div class="praise-cards">${cards}</div>`:''}
    ${flowerDots()}
  `;
}

// 過去の言葉をシャッフル
function refreshMirror(){
  const f=JSON.parse(localStorage.getItem('ht_f')||'[]');
  if(f.length<2) return;
  const card=document.getElementById('mirrorCard');
  if(!card) return;
  const item=f[Math.floor(Math.random()*f.length)];
  const msg=Array.isArray(item.m)?item.m[0]:item.m;
  card.querySelector('.mirror-quote').textContent=msg;
  card.querySelector('.mirror-tag').textContent=`${item.mood} × ${item.scene}`;
}

<!-- STORAGE KEYS
  ht_f            … お気に入り [{mood,scene,m,a,msgIdx,savedAt}, ...]
  ht_onboarded    … オンボーディング完了 ("1")
  ht_snd_tip_shown… 音ツールチップ表示済 ("1")
  ht_days         … 押した日付 ["YYYY-MM-DD", ...] 30日ローリング
  ht_combo_count  … 組み合わせ頻度 {"mood×scene": count}
  ht_total        … 累計押した回数
  ht_today_done   … 今日ヒトオシした日付 "YYYY-MM-DD"
  ht_milestones   … 達成済みマイルストーン回数の配列 [5, 10, ...]
  ht_mood_count   … 気分チップ頻度 {value: count}
  ht_scene_count  … 場所チップ頻度 {value: count}
-->
