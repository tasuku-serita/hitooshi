<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ヒトオシ</title>
<style>
:root {
  --cr: #FDF5EC;
  --lv: #C4B4D8;
  --lv-l: #EDE8F5;
  --lv-m: #B0A0CC;
  --pk: #E0B8C4;
  --pk-l: #F8ECF0;
  --pk-m: #C89AAC;
  --be: #E8DDD0;
  --be-d: #D0C0B0;
  --tx: #4E3E4C;
  --tx-m: #7A6878;
  --tx-s: #A898A8;
  --wh: #FFFFFF;
  --sh: 0 4px 24px rgba(130,90,120,.11);
  --sh-s: 0 2px 10px rgba(130,90,120,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--cr);
  background-image:
    radial-gradient(ellipse at 12% 88%, rgba(196,180,216,.17) 0%, transparent 52%),
    radial-gradient(ellipse at 88% 12%, rgba(224,184,196,.17) 0%, transparent 52%);
  font-family:-apple-system,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  color:var(--tx);
  min-height:100vh;
  padding:0 16px max(32px,env(safe-area-inset-bottom,32px));
  max-width:480px;
  margin:0 auto;
}

/* ── Header ── */
.hd{
  padding:36px 4px 28px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.snd-btn{
  position:absolute;top:36px;right:4px;
  background:var(--wh);border:none;border-radius:20px;
  padding:6px 12px;font-size:11px;color:var(--tx-s);
  cursor:pointer;display:flex;align-items:center;gap:4px;
  box-shadow:var(--sh-s);transition:box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
}
.snd-btn:hover{box-shadow:0 3px 14px rgba(130,90,120,.17)}
.logo{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--lv) 0%,var(--pk) 100%);
  border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;
  box-shadow:0 3px 12px rgba(170,130,190,.28);
}
.app-name{font-size:27px;font-weight:800;letter-spacing:.18em;color:var(--tx)}
.app-sub{font-size:11.5px;color:var(--tx-s);letter-spacing:.05em;line-height:1.65;text-align:center}

/* ── Section ── */
.sec{margin-bottom:20px}
.lbl{
  font-size:10.5px;font-weight:700;color:var(--tx-s);
  letter-spacing:.16em;text-transform:uppercase;
  margin-bottom:10px;
  display:flex;align-items:center;gap:7px;
}
.lbl::after{content:'';flex:1;height:1px;background:var(--be)}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  background:var(--wh);border:1.5px solid var(--be);border-radius:22px;
  padding:7px 14px;font-size:12.5px;color:var(--tx-m);
  cursor:pointer;
  transition:background .16s,border-color .16s,color .16s,box-shadow .16s,transform .1s;
  user-select:none;-webkit-tap-highlight-color:transparent;
  box-shadow:var(--sh-s);
}
.chip:active{transform:scale(.96)}
.mood-chips .chip.on{
  background:var(--lv);border-color:var(--lv);color:#fff;font-weight:600;
  box-shadow:0 3px 12px rgba(160,140,210,.34);
}
.scene-chips .chip.on{
  background:var(--pk);border-color:var(--pk);color:#fff;font-weight:600;
  box-shadow:0 3px 12px rgba(200,154,172,.34);
}

/* ── Main Button ── */
.btn-wrap{padding:4px 0 18px}
.main-btn{
  width:100%;
  background:linear-gradient(135deg,var(--lv-m) 0%,var(--pk-m) 100%);
  border:none;border-radius:26px;
  padding:17px 24px;
  font-size:15.5px;font-weight:700;color:#fff;
  cursor:pointer;letter-spacing:.09em;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 5px 20px rgba(175,125,165,.33);
  -webkit-tap-highlight-color:transparent;
}
.main-btn:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(175,125,165,.42)}
.main-btn:active{transform:translateY(1px);box-shadow:0 3px 12px rgba(175,125,165,.26)}

/* ── Result Card ── */
.card{
  background:var(--wh);border-radius:22px;
  padding:26px 20px 22px;
  margin-bottom:12px;
  box-shadow:var(--sh);
  display:none;opacity:0;transform:translateY(14px);
  transition:opacity .36s ease,transform .36s ease;
  position:relative;overflow:hidden;
}
.card.vis{display:block}
.card.in{opacity:1;transform:translateY(0)}
.card-bar{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--lv) 0%,var(--pk) 100%);
  border-radius:22px 22px 0 0;
}
.card-body{display:flex;gap:14px;align-items:flex-end}
.card-texts{flex:1}
.c-msg{font-size:14.5px;line-height:1.82;color:var(--tx);font-weight:500;margin-bottom:15px}
.c-act-lbl{font-size:9.5px;font-weight:700;color:var(--pk-m);letter-spacing:.12em;margin-bottom:5px}
.c-act{
  background:var(--pk-l);border-radius:11px;
  padding:9px 13px;font-size:12.5px;color:var(--tx-m);line-height:1.5;
}
.mascot-box{
  width:66px;flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:2px;
}
.mascot{
  width:60px;height:60px;
  object-fit:contain;object-position:center;
}
.mascot.pop{animation:mpop .55s cubic-bezier(.34,1.56,.64,1)}
@keyframes mpop{
  0%{transform:scale(1) rotate(0)}
  38%{transform:scale(1.3) rotate(-7deg)}
  68%{transform:scale(.93) rotate(3deg)}
  100%{transform:scale(1) rotate(0)}
}

/* ── Action Buttons ── */
.act-btns{display:none;gap:9px;margin-bottom:22px}
.act-btns.vis{display:flex}
.btn-fav{
  flex:1;background:var(--wh);border:1.5px solid var(--be);border-radius:18px;
  padding:11px 8px;font-size:13px;color:var(--tx-s);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all .18s;-webkit-tap-highlight-color:transparent;
  box-shadow:var(--sh-s);
}
.btn-fav.on{background:var(--pk-l);border-color:var(--pk);color:var(--pk-m)}
.btn-done{
  flex:2;
  background:linear-gradient(135deg,#ECD4F4 0%,#F4D4DC 100%);
  border:none;border-radius:18px;
  padding:11px 8px;
  font-size:13.5px;font-weight:700;color:var(--tx);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 14px rgba(175,145,195,.2);
  -webkit-tap-highlight-color:transparent;
}
.btn-done:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(175,145,195,.3)}
.btn-done:active{transform:translateY(1px)}

/* ── Divider ── */
.div{height:1px;background:linear-gradient(90deg,transparent,var(--be),transparent);margin:4px 0 22px;display:none}

/* ── Favorites ── */
.fav-sec{display:none;padding-bottom:44px}
.fav-sec.vis{display:block}
.fav-ttl{font-size:10.5px;font-weight:700;color:var(--tx-s);letter-spacing:.16em;margin-bottom:12px}
.fav-list{display:flex;flex-direction:column;gap:9px}
.fav-item{
  background:var(--wh);border-radius:16px;padding:12px 13px;
  box-shadow:0 2px 10px rgba(130,90,120,.08);
  display:flex;align-items:flex-start;gap:9px;
}
.fav-con{flex:1}
.fav-tag{font-size:10px;color:var(--tx-s);margin-bottom:3px}
.fav-msg{font-size:12.5px;color:var(--tx-m);line-height:1.55}
.fav-del{background:none;border:none;color:var(--be-d);cursor:pointer;font-size:17px;line-height:1;padding:0;flex-shrink:0;transition:color .15s}
.fav-del:hover{color:var(--pk-m)}

/* ── Confetti ── */
.cel{position:fixed;inset:0;pointer-events:none;z-index:999;display:none}
.cel.on{display:block}
.dot{position:absolute;border-radius:50%;animation:fall linear forwards}
@keyframes fall{
  0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}
  80%{opacity:1}
  100%{opacity:0;transform:translateY(100vh) scale(.35) rotate(540deg)}
}

/* ── Toast ── */
.toast{
  position:fixed;
  bottom:max(28px,env(safe-area-inset-bottom,28px));
  left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(70,55,68,.88);color:#fff;
  padding:9px 18px;border-radius:18px;font-size:12.5px;
  opacity:0;transition:opacity .24s,transform .24s;
  pointer-events:none;z-index:1000;
  backdrop-filter:blur(8px);white-space:nowrap;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:480px){body{padding-bottom:52px}.hd{padding-top:48px}}
@media(max-width:360px){.chip{font-size:12px;padding:6px 12px}.app-name{font-size:24px}}
</style>
</head>

let mood=null, scene=null, soundOn=true, cur=null, faved=false;
let favs=JSON.parse(localStorage.getItem('ht_f')||'[]');
let actx=null;

function ac(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  return actx;
}
function playPop(){
  if(!soundOn)return;
  try{
    const c=ac(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type='sine';
    o.frequency.setValueAtTime(680,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(960,c.currentTime+.07);
    g.gain.setValueAtTime(.2,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.26);
    o.start(c.currentTime);o.stop(c.currentTime+.26);
  }catch(e){}
}
function playWin(){
  if(!soundOn)return;
  try{
    const c=ac();
    [523,659,784,1047].forEach((f,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='sine';o.frequency.value=f;
      const t=c.currentTime+i*.11;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.16,t+.03);
      g.gain.exponentialRampToValueAtTime(.001,t+.38);
      o.start(t);o.stop(t+.38);
    });
  }catch(e){}
}

document.getElementById('moodC').addEventListener('click',e=>{
  const ch=e.target.closest('.chip');if(!ch)return;
  document.querySelectorAll('#moodC .chip').forEach(c=>c.classList.remove('on'));
  ch.classList.add('on');mood=ch.dataset.v;playPop();
});
document.getElementById('sceneC').addEventListener('click',e=>{
  const ch=e.target.closest('.chip');if(!ch)return;
  document.querySelectorAll('#sceneC .chip').forEach(c=>c.classList.remove('on'));
  ch.classList.add('on');scene=ch.dataset.v;playPop();
});

function go(){
  if(!mood||!scene){showToast('気分と場面を選んでね 🌸');return;}
  playPop();
  const d=D[mood][scene];
  cur={mood,scene,...d};
  document.getElementById('cMsg').textContent=d.m;
  document.getElementById('cAct').textContent=d.a;
  faved=favs.some(f=>f.mood===mood&&f.scene===scene);
  syncFav();
  const card=document.getElementById('card');
  card.classList.remove('in');
  card.classList.add('vis');
  document.getElementById('actBtns').classList.add('vis');
  requestAnimationFrame(()=>requestAnimationFrame(()=>card.classList.add('in')));
  setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function toggleFav(){
  if(!cur)return;
  playPop();
  const i=favs.findIndex(f=>f.mood===cur.mood&&f.scene===cur.scene);
  if(i>=0){favs.splice(i,1);faved=false;showToast('お気に入りから外したよ');}
  else{favs.unshift({...cur});faved=true;showToast('お気に入りに追加したよ 💕');}
  localStorage.setItem('ht_f',JSON.stringify(favs));
  syncFav();renderFavs();
}
function syncFav(){
  const btn=document.getElementById('favBtn');
  btn.classList.toggle('on',faved);
  document.getElementById('favIco').textContent=faved?'♥':'♡';
}
function renderFavs(){
  const sec=document.getElementById('favSec');
  const dv=document.getElementById('div');
  const list=document.getElementById('favList');
  if(!favs.length){sec.classList.remove('vis');dv.style.display='none';return;}
  sec.classList.add('vis');dv.style.display='block';
  list.innerHTML=favs.map((f,i)=>`
    <div class="fav-item">
      <div class="fav-con">
        <div class="fav-tag">${f.mood} × ${f.scene}</div>
        <div class="fav-msg">${f.m}</div>
      </div>
      <button class="fav-del" onclick="delFav(${i})">×</button>
    </div>`).join('');
}
function delFav(i){
  if(cur&&favs[i].mood===cur.mood&&favs[i].scene===cur.scene){faved=false;syncFav();}
  favs.splice(i,1);
  localStorage.setItem('ht_f',JSON.stringify(favs));
  renderFavs();playPop();
}

function done(){
  playWin();confetti();
  const m=document.getElementById('mascot');
  m.classList.remove('pop');void m.offsetWidth;m.classList.add('pop');
  showToast('えらい！ほんとにえらい！ 🌸');
}
function confetti(){
  const el=document.getElementById('cel');
  el.innerHTML='';el.classList.add('on');
  const cols=['#C4B4D8','#E0B8C4','#F0C8A8','#C4D0BC','#B8D4E4','#F4D4DC'];
  for(let i=0;i<38;i++){
    const d=document.createElement('div');
    d.className='dot';
    const s=6+Math.random()*7;
    d.style.cssText=`left:${Math.random()*100}vw;top:-14px;width:${s}px;height:${s}px;`
      +`background:${cols[i%cols.length]};`
      +`animation-duration:${1.2+Math.random()*.9}s;`
      +`animation-delay:${Math.random()*.45}s;`;
    el.appendChild(d);
  }
  setTimeout(()=>{el.classList.remove('on');el.innerHTML='';},2500);
}

function toggleSnd(){
  soundOn=!soundOn;
  document.getElementById('sndIco').textContent=soundOn?'🔔':'🔕';
  document.getElementById('sndTxt').textContent=soundOn?'音あり':'音なし';
}

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('on'),2300);
}

renderFavs();
</script>
</body>
</html>
